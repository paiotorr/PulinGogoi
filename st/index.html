<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Sticker Shop</title>
  <!-- Preconnect to font servers so TCP+TLS is ready before CSS requests them -->
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- Non-blocking font load -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" media="print" onload="this.media='all'" />
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" /></noscript>
  <!-- DNS prefetch for Google Drive (all product images) -->
  <link rel="dns-prefetch" href="https://drive.google.com" />
  <link rel="preconnect" href="https://drive.google.com" crossorigin />
  <style>
    /* font-display:swap so text shows instantly in fallback font */

    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── SECURITY: block all text selection & image drag ── */
    body, body * {
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }
    img { pointer-events: none; -webkit-user-drag: none; user-drag: none; }

    /* Allow selection only inside inputs/selects */
    input, select, textarea {
      -webkit-user-select: text;
      -moz-user-select: text;
      -ms-user-select: text;
      user-select: text;
    }
    /* Message box: block selection & copy specifically */
    .message-box {
      -webkit-user-select: none !important;
      -moz-user-select: none !important;
      -ms-user-select: none !important;
      user-select: none !important;
      pointer-events: none;
      cursor: default;
    }
    body {
      font-family: Nunito, sans-serif;
      background: #fff5f5;
      min-height: 100vh;
      font-display: swap;
    }
    .btn {
      border: none;
      cursor: pointer;
      border-radius: 12px;
      font-family: 'Fredoka One', cursive;
      transition: transform .12s, box-shadow .12s;
    }
    .btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 5px 14px rgba(0,0,0,.13); }
    .btn:active:not(:disabled) { transform: translateY(0); }
    .card {
      background: white;
      border-radius: 20px;
      box-shadow: 0 3px 16px rgba(0,0,0,.07);
      overflow: hidden;
      transition: transform .2s, box-shadow .2s;
    }
    /* Shimmer skeleton while images load */
    .product-image[src=""] , .product-image:not([src]) {
      background: linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .card:hover { transform: translateY(-4px); box-shadow: 0 8px 26px rgba(0,0,0,.11); }
    .card { will-change: transform; }
    input, select {
      font-family: Nunito, sans-serif;
      border: 2px solid #ffd6d6;
      border-radius: 10px;
      padding: 9px 12px;
      outline: none;
      font-size: 14px;
      width: 100%;
      background: white;
      appearance: auto;
    }
    input:focus, select:focus { border-color: #ff0000; }
    ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-thumb { background: #ff9999; border-radius: 4px; }

    .header {
      background: #ff0000; /* pure red */
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 4px 20px rgba(255,0,0,.3);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .brand { font-family: 'Fredoka One'; font-size: 22px; color: white; line-height: 1; }
    .subtitle { font-size: 11px; color: rgba(255,255,255,.8); font-weight: 700; margin-top: 1px; }
    .header-actions { display: flex; gap: 8px; }

    /* ── CATEGORY DRUM PICKER ── */
    .cat-drum {
      position: relative;
      height: 54px;
      overflow: hidden;
      touch-action: pan-x;
      user-select: none;
    }
    /* colour glow behind active slot */
    .cat-drum-bg {
      position: absolute;
      inset: 0;
      transition: background 0.3s;
      opacity: 0.12;
      pointer-events: none;
    }
    /* left/right edge fade so only 3 pills show */
    .cat-drum::before,
    .cat-drum::after {
      content: '';
      position: absolute;
      top: 0; bottom: 0;
      width: 22%;
      z-index: 3;
      pointer-events: none;
    }
    .cat-drum::before { left: 0;  background: linear-gradient(to right, #fff5f5 30%, transparent); }
    .cat-drum::after  { right: 0; background: linear-gradient(to left,  #fff5f5 30%, transparent); }
    /* the sliding belt — positioned absolutely, moved by JS transform */
    .cat-drum-belt {
      position: absolute;
      top: 0; bottom: 0;
      display: flex;
      align-items: center;
      gap: 0;
      will-change: transform;
      transition: transform 0.32s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .cat-drum-belt.no-transition { transition: none !important; }
    /* each slot is exactly 1/3 of the drum width — set by JS */
    .cat-drum-slot {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .cat-drum-pill {
      padding: 7px 16px;
      border-radius: 20px;
      font-family: 'Fredoka One';
      font-size: 13px;
      white-space: nowrap;
      border: 2px solid #ffd6d6;
      background: white;
      color: #999;
      transition: background 0.25s, color 0.25s, border-color 0.25s,
                  transform 0.25s, box-shadow 0.25s, opacity 0.25s;
      transform: scale(0.88);
      opacity: 0.55;
      cursor: pointer;
    }
    .cat-drum-slot.active .cat-drum-pill {
      transform: scale(1.12);
      opacity: 1;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    }

    .grid {
      padding: 18px;
      display: grid;
      grid-template-columns: repeat(auto-fill,minmax(158px,1fr));
      gap: 16px;
    }
    .empty-grid {
      grid-column: 1 / -1;
      text-align: center;
      padding: 50px;
      color: #ccc;
      font-family: 'Fredoka One';
      font-size: 18px;
    }
    .product-top {
      padding: 14px;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 120px;
      position: relative;
    }
    .product-image { width: 88px; height: 88px; object-fit: contain; border-radius: 10px; }
    .product-body { padding: 11px 13px; }
    .product-name { font-family: 'Fredoka One'; font-size: 15px; color: #222; }
    .chip {
      border-radius: 20px;
      padding: 2px 9px;
      font-size: 11px;
      font-weight: 800;
      display: inline-block;
      margin-top: 3px;
    }
    .price { font-family: 'Fredoka One'; color: #ff0000; font-size: 20px; margin-top: 7px; }
    .qty-control {
      display: flex;
      align-items: center;
      margin-top: 10px;
      border: 2px solid #ffd6d6;
      border-radius: 12px;
      overflow: hidden;
    }
    .qty-btn {
      flex: 1;
      background: #ffe0e0;
      color: #ff0000;
      height: 36px;
      font-size: 22px;
      border-radius: 0;
      padding: 0;
    }
    .qty-btn:disabled { background: #fff5f5; color: #ccc; cursor: not-allowed; }
    .qty-val {
      flex: 1;
      text-align: center;
      font-family: 'Fredoka One';
      font-size: 18px;
      color: #bbb;
    }
    .qty-val.active { color: #ff0000; }
    .in-cart, .add-hint {
      margin-top: 9px;
      border-radius: 10px;
      padding: 7px 0;
      text-align: center;
      font-family: 'Fredoka One';
      font-size: 13px;
    }
    .in-cart { background: #ff0000; color: white; }
    .add-hint { background: #fff5f5; color: #bbb; }
    .qty-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      background: #ff0000;
      color: white;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-family: 'Fredoka One';
    }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: none;
    }
    .overlay.open { display: flex; }
    .backdrop { flex: 1; background: rgba(0,0,0,.42); }
    .drawer {
      width: 350px;
      background: white;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .drawer-head { display: flex; justify-content: space-between; align-items: center; }
    .drawer-title { font-family: 'Fredoka One'; font-size: 22px; color: #ff0000; }
    .drawer-actions { display: flex; gap: 7px; }
    .small-btn { padding: 6px 11px; font-size: 12px; }
    .back-btn { background: #fff0f0; color: #ff0000; }
    .close-btn { background: #f5f5f5; color: #555; padding: 6px 11px; font-size: 17px; }
    .empty-cart {
      text-align: center;
      padding: 50px;
      color: #ccc;
      font-family: 'Fredoka One';
      font-size: 17px;
    }
    .empty-cart span { font-size: 13px; font-family: Nunito; }
    .cat-head {
      background: #fff0f0;
      border-radius: 10px;
      padding: 6px 12px;
      font-family: 'Fredoka One';
      font-size: 14px;
      margin-bottom: 7px;
    }
    .cart-item, .summary-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 6px;
      border-bottom: 1px solid #fff0f0;
    }
    .cart-image { width: 46px; height: 46px; border-radius: 9px; object-fit: contain; background: #fff5f5; }
    .cart-name { font-family: 'Fredoka One'; font-size: 14px; color: #222; }
    .cart-sub { font-size: 12px; color: #999; margin-top: 1px; }
    .mini-qty { display: flex; align-items: center; gap: 6px; }
    .mini-btn { background: #ffe0e0; color: #ff0000; width: 28px; height: 28px; font-size: 18px; padding: 0; }
    .mini-val { font-family: 'Fredoka One'; font-size: 16px; min-width: 20px; text-align: center; color: #ff0000; }
    .item-total { font-family: 'Fredoka One'; font-size: 15px; color: #ff0000; min-width: 46px; text-align: right; }
    .grand-total {
      background: linear-gradient(135deg,#16a34a,#4ade80);
      border-radius: 12px;
      padding: 9px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .grand-total.multi-cat {
      background: linear-gradient(135deg,#16a34a,#4ade80);
    }
    .grand-total span:first-child { color: white; font-family: 'Fredoka One'; font-size: 13px; }
    .grand-total .value { color: white; font-family: 'Fredoka One'; font-size: 19px; }
    .order-btn {
      background: linear-gradient(135deg,#833ab4,#fd1d1d,#fcb045);
      color: white;
      padding: 16px 0;
      font-size: 20px;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      letter-spacing: 0.3px;
      width: 100%;
    }

    /* ── CUSTOM SELECT STYLING ── */
    .custom-select { position: relative; width: 100%; user-select: none; }
    .custom-select-trigger {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 14px; background: white; border: 2px solid #ffd6d6;
      border-radius: 10px; cursor: pointer; font-family: 'Nunito', sans-serif;
      font-size: 13px; font-weight: 700; color: #444; transition: border-color 0.2s;
    }
    .custom-select-trigger:hover { border-color: #ffb3b3; }
    .custom-options {
      position: absolute; top: 100%; left: 0; right: 0; background: white;
      border: 2px solid #ffd6d6; border-radius: 12px; margin-top: 6px;
      box-shadow: 0 8px 25px rgba(255,0,0,0.15); z-index: 300;
      max-height: 220px; overflow-y: auto; display: none; flex-direction: column;
    }
    .custom-options.open { display: flex; }
    .custom-option {
      padding: 12px 14px; cursor: pointer; transition: background 0.2s;
      border-bottom: 1px solid #fff0f0; display: flex; flex-direction: column; gap: 3px;
    }
    .custom-option:last-child { border-bottom: none; }
    .custom-option:hover:not(.locked) { background: #fff5f5; }
    .custom-option.selected { background: #ffe0e0; border-bottom: 1px solid #ffd6d6; }
    
    /* Locked / Blurry Styling for unavailable options */
    .custom-option.locked {
      opacity: 0.45;
      filter: grayscale(80%);
      cursor: not-allowed;
      background: #fdfdfd;
    }
    
    .opt-name { font-family: 'Fredoka One'; font-size: 13px; color: #222; }
    .opt-min { font-size: 11px; color: #777; font-weight: 700; }
  </style>

  <link rel="preload" as="image" href="https://drive.google.com/thumbnail?id=1HBcKbflMjQ8PufMJQNtvJXnj4OCFRRS1&sz=w400" />

  <link rel="preload" as="image" href="https://drive.google.com/thumbnail?id=1QzYv7qAHWdQZnZW03uDvrcdjLMXdSDJC&sz=w400" />

</head>
<body>
  <div id="app"></div>

  <script>
    "use strict";
    // ============================================================================
    // ⚙️ APP SETTINGS & CONFIGURATION
    // ============================================================================

    const INSTAGRAM_USERNAME = "stiickuu";

    const CATEGORIES = ["All", "Cool", "Cartoon", "Anime", "SuperHero", "Cricketers", "Cute"];
    
    const CAT_COLOR = {
      Anime: "#ff6b6b", 
      Cartoon: "#f5a623", 
      Cricketers: "#4caf50",
      Cool: "#481FFF",
      SuperHero: "#1FF0FF"
      Cute: "#FFC0CB"
    };

    const PICKUP_LOCATIONS = [
      { name: "Front of - Morning Glory Higher Secondary School", min: 1 },
      { name: "Front of - Higher Secondary school", min: 2 },
      { name: "Tiniali of - SANKARDEV SHISU VIDYA NIKETAN BOGINADI", min: 2 },
      { name: "Near - Bogindi Market", min: 4 },
      { name: "Near - Bogindi Police station", min: 5 },
      { name: "Near - Rose Bud Academy", min: 3 }
    ];

    const DEFAULT_STICKERS = [
      { id: 1, name: "EyeRo", category: "Anime", price: 10, image: "https://drive.google.com/file/d/12OAd4ckdsedQGT1f0u58vIEskwSFRlqK/view?usp=sharing" },
      { id: 2, name: "Doraemon", category: "Anime", price: 10, image: "https://drive.google.com/file/d/18y9i-kjBjcMTU6qeFVAs7zPU4NRVuHv8/view?usp=sharing" },
      { id: 3, name: "One Piece", category: "Anime", price: 10, image: "https://drive.google.com/file/d/1HBcKbflMjQ8PufMJQNtvJXnj4OCFRRS1/view?usp=sharing" },
      { id: 4, name: "Oggy", category: "Cartoon", price: 10, image: "https://drive.google.com/file/d/1nkdQb_yLWxTTrsEWyUPQigT40L4Znhu8/view?usp=sharing" },
      { id: 5, name: "Panda", category: "Cartoon", price: 10, image: "https://drive.google.com/file/d/1QzYv7qAHWdQZnZW03uDvrcdjLMXdSDJC/view?usp=sharing" },
      { id: 6, name: "Tom", category: "Cartoon", price: 10, image: "https://drive.google.com/file/d/1tfU0WfMPYTggSKnQ9vpZkWHIBExxzHKk/view?usp=sharing" },
      { id: 7, name: "Virat Kohli", category: "Cricketers", price: 10, image: "https://drive.google.com/file/d/16n25y2A5vNJJ06Xoms5orhGyrBHZtCvu/view?usp=sharing" },
      { id: 8, name: "BlackHat", category: "Cool", price: 10, image: "https://drive.google.com/file/d/1zAyg_MYJoLM6LI7KSU1by7GsSJnOl_I-/view?usp=sharing" },
      { id: 9, name: "Red Eye", category: "Cool", price: 10, image: "https://drive.google.com/file/d/1a9YnKS7xRy0CTUnxkmwN9i4eeo9-GbNk/view?usp=sharing" },
      { id: 10, name: "The Child", category: "Cool", price: 10, image: "https://drive.google.com/file/d/1msti_xgaufqIds5qQy9ATSUTE-WaPn2V/view?usp=drivesdk" },
      { id: 11, name: "Pokemon", category: "Anime", price: 10, image: "https://drive.google.com/thumbnail?id=1ZKHl0-SnNbAcGWCHpm4uhtknUrJrs8HV&sz=w400" },
      { id: 12, name: "Ninja", category: "Anime", price: 10, image: "https://drive.google.com/file/d/1K17cUmXOgwuByDvGBk1SeeKDqFS3qU3u/view?usp=sharing" },
      { id: 13, name: "Bablis", category: "Cool", price: 10, image: "https://drive.google.com/file/d/1lDMUAS0LVbXj9XJeFRN4W-Kty5tvFejo/view?usp=sharing" },
      { id: 14, name: "BatMan", category: "SuperHero", price: 10, image: "https://drive.google.com/file/d/1NDXzibUxm-H7ORXp7VQaBn1QfZryiCst/view?usp=sharing" },
      { id: 15, name: "Direction", category: "Cool", price: 10, image: "https://drive.google.com/file/d/1r_jUyaV6Mt_19DYTk1kJQbji_zr5HJbD/view?usp=sharing" },
      { id: 16, name: "Tiger", category: "Cool", price: 10, image: "https://drive.google.com/file/d/1JAR-szLYI9XZjYtjxazY5I2dpyvx7Myy/view?usp=sharing" },
      { id: 17, name: "Shivji", category: "Cool", price: 10, image: "https://drive.google.com/file/d/19Dkl7lvK-JfoDMOd2pkrHVhtJQj7y9_j/view?usp=sharing" },
      { id: 18, name: "SpiderMan", category: "SuperHero", price: 10, image: "https://drive.google.com/file/d/1wEfjtZzgexRDupjGuIKXS9ddQBKc7uGE/view?usp=sharing" },
      { id: 19, name: "Rabo", category: "Cool", price: 10, image: "https://drive.google.com/file/d/1z0RcWDsk0tk8bfv5Y9h5558-LHthAatu/view?usp=sharing" },
      { id: 20, name: "Hato", category: "Cool", price: 10, image: "https://drive.google.com/file/d/1Qmvtd673zJQtys3mQV2Eo7MnT7d53QB_/view?usp=sharing" },
    ];

    // ============================================================================
    // END OF SETTINGS 
    // ============================================================================

    const state = {
      stickers: DEFAULT_STICKERS.slice(),
      cart: {},
      activeCategory: "All",
      cartOpen: false,
      orderStep: 0,
      copied: false,
      igHandle: INSTAGRAM_USERNAME,
      pickupPlace: "",
      ordering: false
    };

    const app = document.getElementById('app');

    function fixDriveUrl(url) {
      if (!url) return url;
      const m1 = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
      if (m1) return `https://drive.google.com/thumbnail?id=${m1[1]}&sz=w400`;
      const m2 = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
      if (url.includes('drive.google.com') && m2) return `https://drive.google.com/thumbnail?id=${m2[1]}&sz=w400`;
      return url;
    }

    try {
      const saved = localStorage.getItem('customStickers');
      if (saved) JSON.parse(saved).forEach(s => state.stickers.push(s));
    } catch(e) {}

    function saveStickers() {
      try { localStorage.setItem('customStickers', JSON.stringify(state.stickers.filter(s => s.isCustom))); } catch(e) {}
    }

    function deleteSticker(id) {
      state.stickers = state.stickers.filter(s => s.id !== id);
      delete state.cart[id];
      saveStickers();
      render();
    }

    function getQty(id) { return state.cart[id] || 0; }

    function changeQty(id, delta) {
      const next = { ...state.cart };
      const val = (next[id] || 0) + delta;
      if (val <= 0) delete next[id];
      else next[id] = val;
      state.cart = next;
      render();
    }

    function filteredStickers() {
      return state.activeCategory === "All"
        ? state.stickers
        : state.stickers.filter(s => s.category === state.activeCategory);
    }

    function cartStickers() { return state.stickers.filter(s => state.cart[s.id] > 0); }

    function totalQty() { return cartStickers().reduce((a, s) => a + state.cart[s.id], 0); }

    function grandTotal() { return cartStickers().reduce((a, s) => a + state.cart[s.id] * s.price, 0); }

    function grouped() {
      return cartStickers().reduce((acc, s) => {
        if (!acc[s.category]) acc[s.category] = [];
        acc[s.category].push(s);
        return acc;
      }, {});
    }

    function buildMsg() {
      const today = new Date();
      const dateString = today.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
      
      const lines = [];
      Object.entries(grouped()).forEach(([cat, items], index) => {
        if (index > 0) lines.push("");
        
        lines.push(`[ ${cat} ]`);
        items.forEach(s => {
          lines.push(`  • ${s.name}  x${state.cart[s.id]}  = Rs.${state.cart[s.id] * s.price}`);
        });
      });
      return `Hi @${state.igHandle}! 👋\nI want to order these stickers:\n\n${lines.join("\n")}\n\nPickup Place: ${state.pickupPlace}\n\nTotal: Rs.${grandTotal()}\n\nOrder Date: ${dateString}\n\nPlease confirm! 🙏`;
    }

    async function orderViaInstagram() {
      const selectedLoc = PICKUP_LOCATIONS.find(l => l.name === state.pickupPlace);
      if (!selectedLoc || totalQty() < selectedLoc.min) return;

      const text = buildMsg();
      try {
        await navigator.clipboard.writeText(text);
      } catch {
        try {
          const ta = document.createElement("textarea");
          ta.value = text; ta.style.cssText = "position:fixed;top:-9999px;left:-9999px;opacity:0;";
          document.body.appendChild(ta); ta.focus(); ta.select();
          document.execCommand("copy"); document.body.removeChild(ta);
        } catch {}
      }

      state.ordering = true;
      render();

      setTimeout(() => {
        const ua = navigator.userAgent || navigator.vendor || window.opera || "";
        const isIgApp = /instagram/i.test(ua);
        const isAndroid = /android/i.test(ua);
        if (isIgApp) {
          if (isAndroid) {
            window.location.href =
              `intent://user?username=${state.igHandle}#Intent;` +
              `package=com.instagram.android;scheme=instagram;` +
              `S.browser_fallback_url=https%3A%2F%2Fig.me%2Fm%2F${state.igHandle};end`;
          } else {
            window.location.href = `instagram://user?username=${state.igHandle}`;
            setTimeout(() => { window.location.href = `https://ig.me/m/${state.igHandle}`; }, 1000);
          }
        } else {
          window.location.href = `https://ig.me/m/${state.igHandle}`;
        }
      }, 500);
    }

    function resetOrdering() {
      if (state.ordering) { state.ordering = false; render(); }
    }
    document.addEventListener("visibilitychange", () => { if (document.visibilityState === "visible") resetOrdering(); });
    window.addEventListener("focus", resetOrdering);
    window.addEventListener("pageshow", resetOrdering);
    setInterval(() => { if (state.ordering && document.visibilityState === "visible") resetOrdering(); }, 300);

    function closeCart() {
      state.cartOpen = false;
      state.orderStep = 0;
      state.copied = false;
      render();
    }

    function buildGridHTML() {
      const filtered = state.activeCategory === "All"
        ? state.stickers
        : state.stickers.filter(s => s.category === state.activeCategory);
      if (filtered.length === 0) {
        return `<div class="empty-grid">No stickers here yet 😅</div>`;
      }
      return filtered.map(s => {
        const q = state.cart[s.id] || 0;
        const color = CAT_COLOR[s.category] || "#ff0000";
        return `<div class="card">
          <div class="product-top" style="background:${color}18;position:relative;">
            <img src="${fixDriveUrl(s.image)}" alt="${s.name}" class="product-image" loading="lazy" decoding="async" onerror="this.src='https://api.dicebear.com/7.x/fun-emoji/svg?seed=${s.id}'"/>
            ${q>0?`<div class="qty-badge">${q}</div>`:""}
            ${s.isCustom?`<button class="btn" data-delete="${s.id}" style="position:absolute;top:6px;left:8px;background:rgba(255,0,0,0.15);color:#ff0000;padding:2px 7px;font-size:14px;border-radius:8px;">✕</button>`:""}
          </div>
          <div class="product-body">
            <div class="product-name">${s.name}</div>
            <span class="chip" style="background:${color}22;color:${color};">${s.category}</span>
            <div class="price">₹${s.price}</div>
            <div class="qty-control">
              <button class="btn qty-btn" data-minus="${s.id}" ${q===0?"disabled":""} style="background:${q===0?"#fff5f5":"#ffe0e0"};color:${q===0?"#ccc":"#ff0000"};">−</button>
              <span class="qty-val ${q>0?"active":""}">${q}</span>
              <button class="btn qty-btn" data-plus="${s.id}">+</button>
            </div>
            ${q>0?`<div class="in-cart">✅ In Cart — ₹${q*s.price}</div>`:`<div class="add-hint">Press + to add</div>`}
          </div>
        </div>`;
      }).join("");
    }

    function render() {
      const filtered = filteredStickers();
      const groupedCart = grouped();
      const qty = totalQty();
      const total = grandTotal();

      if (state.pickupPlace) {
        const checkLoc = PICKUP_LOCATIONS.find(l => l.name === state.pickupPlace);
        if (checkLoc && qty < checkLoc.min) {
          state.pickupPlace = ""; 
        }
      }

      let btnDisabled = true;
      let btnText = "Order via Instagram";
      
      const selectedLoc = PICKUP_LOCATIONS.find(l => l.name === state.pickupPlace);

      if (!state.pickupPlace) {
        btnText = "⚠️ Select a pickup place";
      } else if (qty < selectedLoc.min) {
        btnText = `⚠️ Minimum ${selectedLoc.min} items required`;
      } else if (state.ordering) {
        btnDisabled = true;
      } else {
        btnDisabled = false;
      }

      const sortedLocations = [...PICKUP_LOCATIONS].sort((a, b) => {
        const aLocked = qty < a.min;
        const bLocked = qty < b.min;
        if (!aLocked && bLocked) return -1;
        if (aLocked && !bLocked) return 1;
        return a.min - b.min;
      });

      const _drawerScrollTop = (document.querySelector(".drawer") || {}).scrollTop || 0;
      const _prevBelt = document.getElementById("catDrumBelt");
      const _prevBeltHTML = _prevBelt ? _prevBelt.innerHTML : "";
      const _prevBeltLeft = _prevBelt ? _prevBelt.style.left : "";
      const _prevBg = document.getElementById("catDrumBg");
      const _prevBgColor = _prevBg ? _prevBg.style.background : "";

      app.innerHTML = `
        <div style="font-family: Nunito, sans-serif; background: #fff5f5; min-height: 100vh;">
          <header class="header">
            <div class="header-left">
              <span style="font-size: 28px">🎨</span>
              <div>
                <div class="brand">@${state.igHandle}</div>
                <div class="subtitle">PAIOTORR</div>
              </div>
            </div>
            <div class="header-actions">
              <button class="btn" id="cartBtn" style="background: white; color: #ff0000; padding: 8px 16px; font-family: 'Fredoka One'; font-size: 14px; display: flex; align-items: center; gap: 5px;">
                🛒 Cart
                ${qty > 0 ? `<span style="background:#ff0000;color:white;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:12px;">${qty}</span>` : ""}
              </button>
            </div>
          </header>

          <div class="cat-drum" id="catDrum">
            <div class="cat-drum-bg" id="catDrumBg"></div>
            <div class="cat-drum-belt" id="catDrumBelt"></div>
          </div>

          <div class="grid" id="productGrid">
            ${buildGridHTML()}
          </div>

          ${state.cartOpen ? `
            <div class="overlay open" id="drawerOverlay">
              <div class="backdrop" id="backdrop"></div>
              <div class="drawer">
                <div class="drawer-head">
                  <span class="drawer-title">🛒 Cart</span>
                  <div class="drawer-actions">
                    <button class="btn close-btn" id="closeBtn">✕</button>
                  </div>
                </div>

                ${qty === 0 ? `
                  <div class="empty-cart">
                    Cart is empty 😅<br />
                    <span>Press + on any sticker!</span>
                  </div>
                ` : `
                  ${Object.entries(groupedCart).map(([cat, items]) => `
                    <div>
                      <div class="cat-head" style="background:${(CAT_COLOR[cat] || "#ff0000")}18;color:${CAT_COLOR[cat] || "#ff0000"};">${cat}</div>
                      ${items.map(s => `
                        <div class="cart-item">
                          <img src="${fixDriveUrl(s.image)}" alt="${s.name}" class="cart-image" loading="lazy" decoding="async" onerror="this.src='https://api.dicebear.com/7.x/fun-emoji/svg?seed=${s.id}'" />
                          <div style="flex:1;">
                            <div class="cart-name">${s.name}</div>
                            <div class="cart-sub">₹${s.price} each</div>
                          </div>
                          <div class="mini-qty">
                            <button class="btn mini-btn" data-minus="${s.id}">−</button>
                            <span class="mini-val">${state.cart[s.id]}</span>
                            <button class="btn mini-btn" data-plus="${s.id}">+</button>
                          </div>
                          <div class="item-total">₹${state.cart[s.id] * s.price}</div>
                        </div>
                      `).join("")}
                    </div>
                  `).join("")}

                  <div style="margin-top: 10px; padding: 12px; background: #fff8f8; border: 1px solid #ffd6d6; border-radius: 12px;">
                    <div style="font-family:'Fredoka One';font-size:14px;color:#ff0000;margin-bottom:8px;">📍 Pickup Details</div>
                    
                    <div class="custom-select" id="customPickupSelect">
                      <div class="custom-select-trigger" id="pickupTrigger">
                        <span>${state.pickupPlace ? state.pickupPlace : '-- Choose Pickup Location --'}</span>
                        <span style="color: #ff0000; font-size: 11px;">▼</span>
                      </div>
                      <div class="custom-options" id="pickupOptions">
                        ${sortedLocations.map(loc => {
                          const isLocked = qty < loc.min;
                          return `
                          <div class="custom-option ${state.pickupPlace === loc.name ? 'selected' : ''} ${isLocked ? 'locked' : ''}" data-value="${loc.name}">
                            <div class="opt-name">${loc.name}</div>
                            <div class="opt-min" style="${isLocked ? 'color: #ff4444;' : ''}">
                              ${isLocked ? `🔒 Locked — Add ${loc.min - qty} more to unlock` : `✅ Unlocked — Min order: ${loc.min}`}
                            </div>
                          </div>
                        `}).join("")}
                      </div>
                    </div>

                  </div>

                  <div class="grand-total${Object.keys(groupedCart).length > 1 ? ' multi-cat' : ''}" style="margin-top: 4px;">
                    <span>Grand Total</span>
                    <span class="value">₹${total}</span>
                  </div>

                  <button class="btn order-btn" id="orderBtn" ${btnDisabled ? 'disabled style="background: #e5e7eb; color: #9ca3af; box-shadow: none; font-size: 16px;"' : ''}>
                    ${btnText}
                  </button>
                `}
              </div>
            </div>
          ` : ""}
        </div>
      `;

      document.getElementById("cartBtn").addEventListener("click", () => {
        state.cartOpen = true;
        state.orderStep = 0;
        render();
      });

      // restore drum belt immediately so there is no blank frame before _initDial runs
      if (_prevBeltHTML) {
        const _newBelt = document.getElementById("catDrumBelt");
        const _newBg   = document.getElementById("catDrumBg");
        if (_newBelt) { _newBelt.innerHTML = _prevBeltHTML; _newBelt.style.left = _prevBeltLeft; }
        if (_newBg)   { _newBg.style.background = _prevBgColor; }
      }

      if (_drawerScrollTop > 0) {
        const _d = document.querySelector(".drawer");
        if (_d) _d.scrollTop = _drawerScrollTop;
      }

      // attach events for the inline-rendered grid
      document.querySelectorAll("#productGrid [data-plus]").forEach(b =>
        b.addEventListener("click", () => changeQty(Number(b.dataset.plus), 1)));
      document.querySelectorAll("#productGrid [data-minus]").forEach(b =>
        b.addEventListener("click", () => changeQty(Number(b.dataset.minus), -1)));

      document.querySelectorAll("[data-delete]").forEach(btn => {
        btn.addEventListener("click", (e) => {
          e.stopPropagation();
          deleteSticker(Number(btn.dataset.delete));
        });
      });

      // dial items handle their own clicks — no separate data-cat listeners needed
      // ── DIAL: re-init on every render since DOM is rebuilt ───────────────
      if (!window._dialAudio) {
        // AudioContext — created once, persisted across renders
        window._dialAudio = { ctx: null };
      }

      window._tick = function() {
        try {
          if (!window._dialAudio.ctx)
            window._dialAudio.ctx = new (window.AudioContext || window.webkitAudioContext)();
          const ctx = window._dialAudio.ctx;
          if (ctx.state === "suspended") ctx.resume();
          const len = Math.floor(ctx.sampleRate * 0.035);
          const buf = ctx.createBuffer(1, len, ctx.sampleRate);
          const d = buf.getChannelData(0);
          for (let i = 0; i < len; i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/len, 7);
          const src = ctx.createBufferSource();
          src.buffer = buf;
          const bp = ctx.createBiquadFilter();
          bp.type = "bandpass"; bp.frequency.value = 2400; bp.Q.value = 1.2;
          const g = ctx.createGain(); g.gain.value = 0.6;
          src.connect(bp); bp.connect(g); g.connect(ctx.destination);
          src.start();
        } catch(e) {}
      };

      window._renderGrid = function() {
        const gridEl = document.getElementById("productGrid");
        if (!gridEl) return;
        gridEl.innerHTML = buildGridHTML();
        gridEl.querySelectorAll("[data-plus]").forEach(b =>
          b.addEventListener("click", () => changeQty(Number(b.dataset.plus), 1)));
        gridEl.querySelectorAll("[data-minus]").forEach(b =>
          b.addEventListener("click", () => changeQty(Number(b.dataset.minus), -1)));
        gridEl.querySelectorAll("[data-delete]").forEach(b =>
          b.addEventListener("click", e => { e.stopPropagation(); deleteSticker(Number(b.dataset.delete)); }));
      };

      window._initDial = function() {
        const drum  = document.getElementById("catDrum");
        const belt  = document.getElementById("catDrumBelt");
        const bg    = document.getElementById("catDrumBg");
        if (!drum || !belt || !bg) return;

        const N   = CATEGORIES.length;
        let cur   = Math.max(0, CATEGORIES.indexOf(state.activeCategory));

        let slotW, slots;

        if (belt.children.length === 5 && window._drumSlotW) {
          // belt already populated (restored after render) — skip DOM rebuild to prevent blink
          slotW = window._drumSlotW;
          slots = Array.from(belt.children).map(slot => ({ slot, pill: slot.querySelector(".cat-drum-pill") }));
        } else {
          // first load — build slots and measure
          belt.innerHTML = "";
          slots = [];
          for (let s = 0; s < 5; s++) {
            const slot = document.createElement("div");
            slot.className = "cat-drum-slot" + (s === 2 ? " active" : "");
            const pill = document.createElement("div");
            pill.className = "cat-drum-pill";
            pill.textContent = CATEGORIES[s % N];
            slot.appendChild(pill);
            belt.appendChild(slot);
            slots.push({ slot, pill });
          }
          const tempPill = document.createElement("div");
          tempPill.className = "cat-drum-pill";
          tempPill.style.cssText = "position:absolute;visibility:hidden;white-space:nowrap;";
          document.body.appendChild(tempPill);
          let maxW = 0;
          CATEGORIES.forEach(cat => { tempPill.textContent = cat; maxW = Math.max(maxW, tempPill.offsetWidth); });
          document.body.removeChild(tempPill);
          slotW = maxW + 20;
          window._drumSlotW = slotW;
          slots.forEach(({ slot }) => { slot.style.width = slotW + "px"; });
          const beltBase = drum.offsetWidth / 2 - 2.5 * slotW;
          belt.style.left = beltBase + "px";
        }

        // ── paint ─────────────────────────────────────────────
        function colorOf(idx) { return CAT_COLOR[CATEGORIES[idx]] || "#ff0000"; }

        function paint(activeIdx) {
          const color = colorOf(activeIdx);
          bg.style.background = color;
          const offsets = [-2, -1, 0, 1, 2];
          offsets.forEach((off, s) => {
            const ri  = ((activeIdx + off) % N + N) % N;
            const { slot, pill } = slots[s];
            const isActive = off === 0;
            slot.classList.toggle("active", isActive);
            pill.textContent = CATEGORIES[ri];
            if (isActive) {
              pill.style.background  = color;
              pill.style.color       = "white";
              pill.style.borderColor = "transparent";
            } else {
              pill.style.background  = "white";
              pill.style.color       = Math.abs(off) === 1 ? "#777" : "#bbb";
              pill.style.borderColor = Math.abs(off) === 1 ? "#ffd6d6" : "#eee";
            }
          });
        }

        paint(cur);

        // ── drag ──────────────────────────────────────────────
        let dragging = false, startX = 0, stepped = 0;
        const STEP = slotW * 0.42;

        function getX(e) { return e.touches ? e.touches[0].clientX : e.clientX; }

        function advance(dir) {
          cur = ((cur - dir) % N + N) % N;
          window._tick();
          paint(cur);
          const shift = dir * slotW * 0.6;
          belt.classList.add("no-transition");
          belt.style.transform = `translateX(${shift}px)`;
          requestAnimationFrame(() => requestAnimationFrame(() => {
            belt.classList.remove("no-transition");
            belt.style.transform = "translateX(0)";
          }));
        }

        function onStart(e) {
          dragging = true; startX = getX(e); stepped = 0;
          belt.classList.add("no-transition");
        }
        function onMove(e) {
          if (!dragging) return;
          const delta = getX(e) - startX;
          const stepsNow = Math.round(delta / STEP);
          const diff = stepsNow - stepped;
          if (diff !== 0) { stepped = stepsNow; advance(diff > 0 ? 1 : -1); }
          belt.style.transform = `translateX(${(delta - stepped * STEP) * 0.3}px)`;
        }
        function onEnd() {
          if (!dragging) return;
          dragging = false;
          belt.classList.remove("no-transition");
          belt.style.transform = "translateX(0)";
          state.activeCategory = CATEGORIES[cur];
          window._renderGrid();
        }

        drum.addEventListener("touchstart",  onStart, { passive: true });
        drum.addEventListener("touchmove",   onMove,  { passive: true });
        drum.addEventListener("touchend",    onEnd);
        drum.addEventListener("touchcancel", onEnd);
        drum.addEventListener("mousedown",   onStart);
        window.addEventListener("mousemove", onMove);
        window.addEventListener("mouseup",   onEnd);

        // tap left/right pill to step one
        slots[1].slot.addEventListener("click", () => { advance(-1); setTimeout(() => { state.activeCategory = CATEGORIES[cur]; window._renderGrid(); }, 340); });
        slots[3].slot.addEventListener("click", () => { advance( 1); setTimeout(() => { state.activeCategory = CATEGORIES[cur]; window._renderGrid(); }, 340); });
      };

      // call initDial every render (safe — IDs are stable, re-attaches cleanly)
      requestAnimationFrame(() => {
        if (window._initDial) window._initDial();
        // populate grid after dial is ready
        if (window._renderGrid) window._renderGrid();
      });

      if (state.cartOpen) {
        document.getElementById("backdrop").addEventListener("click", closeCart);
        document.getElementById("closeBtn").addEventListener("click", closeCart);

        document.querySelectorAll(".mini-btn[data-plus]").forEach(b =>
          b.addEventListener("click", () => changeQty(Number(b.dataset.plus), 1)));
        document.querySelectorAll(".mini-btn[data-minus]").forEach(b =>
          b.addEventListener("click", () => changeQty(Number(b.dataset.minus), -1)));
        
        const pickupTrigger = document.getElementById("pickupTrigger");
        const pickupOptions = document.getElementById("pickupOptions");
        
        if (pickupTrigger && pickupOptions) {
          pickupTrigger.addEventListener("click", (e) => {
            e.stopPropagation();
            pickupOptions.classList.toggle("open");
          });

          document.querySelectorAll(".custom-option").forEach(opt => {
            opt.addEventListener("click", (e) => {
              e.stopPropagation();
              if (opt.classList.contains("locked")) return; 
              
              state.pickupPlace = opt.dataset.value;
              render(); 
            });
          });

          const drawer = document.querySelector(".drawer");
          if (drawer) {
            drawer.addEventListener("click", (e) => {
              if (pickupOptions.classList.contains("open") && !pickupTrigger.contains(e.target)) {
                pickupOptions.classList.remove("open");
              }
            });
          }
        }

        const orderBtn = document.getElementById("orderBtn");
        if (orderBtn) orderBtn.addEventListener("click", orderViaInstagram);
      }
    }

    render();
  </script>

  <script>
    // ══════════════════════════════════════════════
    //  SECURITY LAYER — Maximum Protection
    // ══════════════════════════════════════════════
    document.addEventListener("contextmenu", function(e) { e.preventDefault(); e.stopPropagation(); return false; }, true);
    document.addEventListener("keydown", function(e) {
      const key = e.key ? e.key.toLowerCase() : "";
      const ctrl = e.ctrlKey || e.metaKey;
      const shift = e.shiftKey;
      if (e.keyCode === 123) { e.preventDefault(); return false; }
      if (ctrl && shift && (key === "i" || key === "j" || key === "c" || key === "k")) { e.preventDefault(); return false; }
      if (ctrl && !shift && (key === "u" || key === "s" || key === "p" || key === "a")) { e.preventDefault(); return false; }
    }, true);
    document.addEventListener("dragstart", function(e) { e.preventDefault(); return false; }, true);
    document.addEventListener("copy", function(e) { if (!window._allowCopy) { e.preventDefault(); return false; } }, true);
    document.addEventListener("cut", function(e) { e.preventDefault(); return false; }, true);
    document.addEventListener("selectstart", function(e) {
      const box = document.getElementById("messageBox");
      if (box && (e.target === box || box.contains(e.target))) { e.preventDefault(); return false; }
    }, true);

    (function devToolsGuard() {
      const threshold = 160;
      function check() {
        if (window.outerWidth - window.innerWidth > threshold || window.outerHeight - window.innerHeight > threshold) {
          document.body.style.filter = "blur(8px)";
          document.body.style.pointerEvents = "none";
        } else {
          document.body.style.filter = "";
          document.body.style.pointerEvents = "";
        }
      }
      window.addEventListener("resize", check);
      setInterval(check, 1000);
    })();
  </script>
</body>
</html>

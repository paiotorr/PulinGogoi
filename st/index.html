<!DOCTYPE html>

<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pkitaap</title>
    <link rel="stylesheet" href="./pkitaap_files/styles.css">
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-left">
        <div class="logo">PKITAAP</div>
      </div>
      <div class="topbar-right">
        <button class="menu-btn" id="menuBtn" type="button" aria-label="Open menu">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
      <div class="menu-panel" id="menuPanel">
        <div class="menu-title">Menu</div>
        <button type="button" id="loginBtn">Login</button>
        <button data-page="sell">Sell</button>
        <button data-page="admin">Admin portal</button>
        <button type="button">Account details</button>
      </div>
    </header>

    <div class="shell">
      <main class="main">
        <section class="page active" id="buyPage">
          <div class="page-head">
            <div class="search-wrap">
              <input id="searchInput" placeholder="Search books">
              <button id="clearSearch" type="button" aria-label="Clear search" style="display: none;">x</button>
            </div>
          </div>

          <div class="location-lock">
            <div>
              <span>Country</span>
              <strong>India</strong>
            </div>
            <div>
              <span>State</span>
              <strong>Assam</strong>
            </div>
          </div>

          <div class="card">
            <div class="card-head">
              <h2 id="catalogTitle">Classes</h2>
              <button class="btn btn-ghost" id="backBtn" type="button" style="display: none;">Back</button>
            </div>
            <div class="card-body">
              <div class="class-grid" id="classGrid" style="display: grid;">
      <button class="class-card " data-class="Class 9">
        <img src="data:image/svg+xml;charset=UTF-8,%0A%20%20%20%20%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22500%22%20height%3D%22360%22%20viewBox%3D%220%200%20500%20360%22%3E%0A%20%20%20%20%20%20%3Crect%20width%3D%22500%22%20height%3D%22360%22%20rx%3D%2226%22%20fill%3D%22%2316a34a%22%2F%3E%0A%20%20%20%20%20%20%3Ctext%20x%3D%2250%25%22%20y%3D%2250%25%22%20dominant-baseline%3D%22middle%22%20text-anchor%3D%22middle%22%0A%20%20%20%20%20%20%20%20fill%3D%22%23ffffff%22%20font-family%3D%22Arial%22%20font-size%3D%2242%22%20font-weight%3D%22800%22%3EClass%209%3C%2Ftext%3E%0A%20%20%20%20%3C%2Fsvg%3E" alt="Class 9">
        <div class="card-info">
          <strong>Class 9</strong>
          <span>3 books</span>
        </div>
      </button>
    
      <button class="class-card " data-class="Class 10">
        <img src="data:image/svg+xml;charset=UTF-8,%0A%20%20%20%20%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22500%22%20height%3D%22360%22%20viewBox%3D%220%200%20500%20360%22%3E%0A%20%20%20%20%20%20%3Crect%20width%3D%22500%22%20height%3D%22360%22%20rx%3D%2226%22%20fill%3D%22%2316a34a%22%2F%3E%0A%20%20%20%20%20%20%3Ctext%20x%3D%2250%25%22%20y%3D%2250%25%22%20dominant-baseline%3D%22middle%22%20text-anchor%3D%22middle%22%0A%20%20%20%20%20%20%20%20fill%3D%22%23ffffff%22%20font-family%3D%22Arial%22%20font-size%3D%2242%22%20font-weight%3D%22800%22%3EClass%2010%3C%2Ftext%3E%0A%20%20%20%20%3C%2Fsvg%3E" alt="Class 10">
        <div class="card-info">
          <strong>Class 10</strong>
          <span>2 books</span>
        </div>
      </button>
    
      <button class="class-card " data-class="Class 11">
        <img src="data:image/svg+xml;charset=UTF-8,%0A%20%20%20%20%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22500%22%20height%3D%22360%22%20viewBox%3D%220%200%20500%20360%22%3E%0A%20%20%20%20%20%20%3Crect%20width%3D%22500%22%20height%3D%22360%22%20rx%3D%2226%22%20fill%3D%22%2316a34a%22%2F%3E%0A%20%20%20%20%20%20%3Ctext%20x%3D%2250%25%22%20y%3D%2250%25%22%20dominant-baseline%3D%22middle%22%20text-anchor%3D%22middle%22%0A%20%20%20%20%20%20%20%20fill%3D%22%23ffffff%22%20font-family%3D%22Arial%22%20font-size%3D%2242%22%20font-weight%3D%22800%22%3EClass%2011%3C%2Ftext%3E%0A%20%20%20%20%3C%2Fsvg%3E" alt="Class 11">
        <div class="card-info">
          <strong>Class 11</strong>
          <span>3 books</span>
        </div>
      </button>
    
      <button class="class-card " data-class="Class 12">
        <img src="data:image/svg+xml;charset=UTF-8,%0A%20%20%20%20%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22500%22%20height%3D%22360%22%20viewBox%3D%220%200%20500%20360%22%3E%0A%20%20%20%20%20%20%3Crect%20width%3D%22500%22%20height%3D%22360%22%20rx%3D%2226%22%20fill%3D%22%2316a34a%22%2F%3E%0A%20%20%20%20%20%20%3Ctext%20x%3D%2250%25%22%20y%3D%2250%25%22%20dominant-baseline%3D%22middle%22%20text-anchor%3D%22middle%22%0A%20%20%20%20%20%20%20%20fill%3D%22%23ffffff%22%20font-family%3D%22Arial%22%20font-size%3D%2242%22%20font-weight%3D%22800%22%3EClass%2012%3C%2Ftext%3E%0A%20%20%20%20%3C%2Fsvg%3E" alt="Class 12">
        <div class="card-info">
          <strong>Class 12</strong>
          <span>3 books</span>
        </div>
      </button>
    </div>
              <div class="stream-grid" id="boardGrid" style="display: none;"></div>
              <div class="stream-grid" id="streamGrid" style="display: none;"></div>
              <div class="book-grid" id="bookGrid" style="display: none;"><div>No books</div></div>
            </div>
          </div>

          <div class="card" id="categoryCard" style="display: none;">
            <div class="card-head">
              <h2>More Categories</h2>
            </div>
            <div class="card-body">
              <div class="class-grid" id="categoryGrid"></div>
            </div>
          </div>

          <div class="card" id="matchCard" style="display: none;">
            <div class="card-head">
              <h2>Match</h2>
            </div>
            <div class="card-body">
              <form id="buyForm" class="form-grid">
                <label>
                  District
                  <select id="buyDistrict"><option>Lakhimpur</option><option>Majuli</option></select>
                </label>
                <label>
                  Place
                  <select id="buyPlace"><option>North Lakhimpur</option><option>Boginadi</option></select>
                </label>
                <label class="wide">
                  School
                  <select id="buySchool"><option>North Lakhimpur H.S. School</option><option>Brookfield School</option></select>
                </label>
                <button class="btn btn-primary wide" type="submit">Find sellers</button>
              </form>
              <div class="result-list" id="matchList"></div>
            </div>
          </div>
        </section>

        <section class="page" id="sellPage">
          <div class="page-head">
            <h1>Sell Books</h1>
            <button class="btn btn-ghost" data-go-buy="">Select book</button>
          </div>

          <div class="location-lock">
            <div>
              <span>Country</span>
              <strong>India</strong>
            </div>
            <div>
              <span>State</span>
              <strong>Assam</strong>
            </div>
          </div>

          <div class="card">
            <div class="card-head">
              <h2>Selected Book</h2>
            </div>
            <div class="card-body">
              <div id="selectedBox" class="selected-box">
      <strong>No subject selected</strong>
      <span>Select class, board, stream, and subject first.</span>
    </div>
            </div>
          </div>

          <div class="card">
            <div class="card-head">
              <h2>Seller Details</h2>
            </div>
            <div class="card-body">
              <form id="sellForm" class="form-grid">
                <label>
                  District
                  <select id="sellDistrict"><option>Lakhimpur</option><option>Majuli</option></select>
                </label>
                <label>
                  Place
                  <select id="sellPlace"><option>North Lakhimpur</option><option>Boginadi</option></select>
                </label>
                <label class="wide">
                  School
                  <select id="sellSchool"><option>North Lakhimpur H.S. School</option><option>Brookfield School</option></select>
                </label>
                <label>
                  Condition
                  <select id="condition">
                    <option>Good</option>
                    <option>Usable</option>
                    <option>Like new</option>
                  </select>
                </label>
                <label>
                  Photos
                  <input id="photos" placeholder="Upload later">
                </label>
                <button class="btn btn-primary wide" type="submit">Submit</button>
              </form>
            </div>
          </div>
        </section>

        <section class="page" id="adminPage">
          <div class="page-head">
            <h1>Admin</h1>
            <button class="btn btn-ghost" id="resetBtn">Reset</button>
          </div>

          <div class="admin-grid">
            <div class="card">
              <div class="card-head">
                <h2>Settings</h2>
              </div>
              <div class="card-body">
                <label class="toggle"><span>General books</span><input id="generalToggle" type="checkbox"></label>
                <label class="toggle"><span>Instagram</span><input id="instagramToggle" type="checkbox"></label>
                <label class="toggle"><span>WhatsApp</span><input id="whatsappToggle" type="checkbox"></label>
              </div>
            </div>

            <div class="card">
              <div class="card-head">
                <h2>Add Book</h2>
              </div>
              <div class="card-body">
                <form id="bookForm" class="stack-form">
                  <select id="bookType">
                    <option value="school">School book</option>
                    <option value="general">General book</option>
                  </select>
                  <input id="bookClass" placeholder="Class 9 / General" required="">
                  <input id="bookBoard" placeholder="SEBA / AHSEC / CBSE">
                  <input id="bookStream" placeholder="Science / Commerce / Arts">
                  <input id="bookTitle" placeholder="Subject or book name" required="">
                  <input id="bookAuthor" placeholder="Author">
                  <input id="bookImage" placeholder="Book image URL">
                  <input id="bookPrice" type="number" placeholder="Price" required="">
                  <button class="btn btn-primary" type="submit">Add</button>
                </form>
              </div>
            </div>

            <div class="card">
              <div class="card-head">
                <h2>Add Location</h2>
              </div>
              <div class="card-body">
                <form id="locationForm" class="stack-form">
                  <input id="newDistrict" placeholder="District" required="">
                  <input id="newPlace" placeholder="Place" required="">
                  <input id="newSchool" placeholder="School" required="">
                  <button class="btn btn-primary" type="submit">Add</button>
                </form>
              </div>
            </div>

            <div class="card">
              <div class="card-head">
                <h2>Class Thumbnail</h2>
              </div>
              <div class="card-body">
                <form id="classThumbForm" class="stack-form">
                  <input id="thumbClass" placeholder="Class 9 / Class 10 / General" required="">
                  <input id="thumbImage" placeholder="Thumbnail image URL" required="">
                  <button class="btn btn-primary" type="submit">Save</button>
                </form>
              </div>
            </div>

            <div class="card">
              <div class="card-head">
                <h2>Add Category</h2>
              </div>
              <div class="card-body">
                <form id="categoryForm" class="stack-form">
                  <input id="categoryName" placeholder="Novels / Author Books" required="">
                  <input id="categoryImage" placeholder="Category image URL">
                  <button class="btn btn-primary" type="submit">Add</button>
                </form>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <dialog id="loginDialog">
      <form method="dialog" class="modal">
        <div class="card-head">
          <h2>Login</h2>
          <button class="btn btn-ghost" value="close">Close</button>
        </div>
        <div class="card-body stack-form">
          <input type="tel" placeholder="Mobile number">
          <input inputmode="numeric" placeholder="OTP">
          <input type="password" placeholder="PIN or password">
          <input type="date">
          <button class="btn btn-primary" value="close">Continue</button>
        </div>
      </form>
    </dialog>

    <div id="toast"></div>
    <script src="./pkitaap_files/app.js"></script>
  

</body></html>

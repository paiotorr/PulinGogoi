    img { pointer-events: none; -webkit-user-drag: none; user-drag: none; }
    input, select, textarea { -webkit-user-select: text; -moz-user-select: text; -ms-user-select: text; user-select: text; }
    .message-box { -webkit-user-select: none !important; -moz-user-select: none !important; -ms-user-select: none !important; user-select: none !important; pointer-events: none; cursor: default; }
    body { font-family: Nunito, sans-serif; background: #fff5f5; min-height: 100vh; font-display: swap; }
    .btn { border: none; cursor: pointer; border-radius: 12px; font-family: 'Fredoka One', cursive; transition: transform .12s, box-shadow .12s; }
    .btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 5px 14px rgba(0,0,0,.13); }
    .btn:active:not(:disabled) { transform: translateY(0); }
    .card { background: white; border-radius: 20px; box-shadow: 0 3px 16px rgba(0,0,0,.07); overflow: hidden; transition: transform .2s, box-shadow .2s; }
    .product-image[src=""], .product-image:not([src]) { background: linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.2s infinite; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .card:hover { transform: translateY(-4px); box-shadow: 0 8px 26px rgba(0,0,0,.11); }
    .card { will-change: transform; }
    input, select { font-family: Nunito, sans-serif; border: 2px solid #ffd6d6; border-radius: 10px; padding: 9px 12px; outline: none; font-size: 14px; width: 100%; background: white; appearance: auto; }
    input:focus, select:focus { border-color: #ff0000; }
    ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-thumb { background: #ff9999; border-radius: 4px; }
    #stickerPopup { position: fixed; inset: 0; z-index: 500; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,0.65); backdrop-filter: blur(4px); padding: 16px; }
    #stickerPopup.open { display: flex; }
    .popup-card { background: white; border-radius: 28px; width: min(92vw, 380px); max-height: 90vh; overflow: hidden; box-shadow: 0 24px 70px rgba(0,0,0,0.4); animation: popIn 0.28s cubic-bezier(0.34,1.56,0.64,1); position: relative; display: flex; flex-direction: column; }
    @keyframes popIn { from { transform: scale(0.72); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .popup-close-btn { position: absolute; top: 14px; right: 14px; width: 34px; height: 34px; border-radius: 50%; background: rgba(255,255,255,0.85); border: none; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #444; z-index: 20; box-shadow: 0 2px 8px rgba(0,0,0,0.15); transition: background 0.15s, transform 0.15s; }
    .popup-close-btn:hover { background: white; transform: scale(1.1); }
    .popup-slider-wrap { position: relative; width: 100%; overflow: hidden; flex-shrink: 0; }
    .popup-slider-track { display: flex; transition: transform 0.38s cubic-bezier(0.4,0,0.2,1); will-change: transform; }
    .popup-slide { flex-shrink: 0; width: 100%; display: flex; align-items: center; justify-content: center; padding: 32px 24px 24px; min-height: 260px; }
    .popup-slide img { width: 210px; height: 210px; object-fit: contain; border-radius: 18px; pointer-events: none; -webkit-user-drag: none; }
    .popup-dots { display: flex; justify-content: center; align-items: center; gap: 7px; padding: 0 0 14px; background: transparent; }
    .popup-dot { width: 9px; height: 9px; border-radius: 50%; background: rgba(0,0,0,0.18); transition: background 0.2s, transform 0.2s; cursor: pointer; }
    .popup-dot.active { background: rgba(0,0,0,0.55); transform: scale(1.25); }
    .popup-info { padding: 16px 20px 20px; display: flex; flex-direction: column; gap: 6px; }
    .popup-name { font-family: 'Fredoka One'; font-size: 23px; color: #222; }
    .popup-meta { display: flex; align-items: center; gap: 10px; }
    .popup-price { font-family: 'Fredoka One'; font-size: 21px; color: #ff0000; }
    .dbl-hint { font-size: 10px; color: #bbb; font-family: Nunito; font-weight: 700; text-align: center; margin-top: 4px; letter-spacing: 0.3px; }
    .header { background: #ff0000; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 4px 20px rgba(255,0,0,.3); position: sticky; top: 0; z-index: 100; }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .brand { font-family: 'Fredoka One'; font-size: 22px; color: white; line-height: 1; }
    .subtitle { font-size: 11px; color: rgba(255,255,255,.8); font-weight: 700; margin-top: 1px; }
    .header-actions { display: flex; gap: 8px; }
    .cat-drum { position: relative; height: 54px; overflow: hidden; touch-action: pan-x; user-select: none; }
    .cat-drum-bg { position: absolute; inset: 0; transition: background 0.3s; opacity: 0.12; pointer-events: none; }
    .cat-drum::before, .cat-drum::after { content: ''; position: absolute; top: 0; bottom: 0; width: 22%; z-index: 3; pointer-events: none; }
    .cat-drum::before { left: 0; background: linear-gradient(to right, #fff5f5 30%, transparent); }
    .cat-drum::after { right: 0; background: linear-gradient(to left, #fff5f5 30%, transparent); }
    .cat-drum-belt { position: absolute; top: 0; bottom: 0; display: flex; align-items: center; gap: 0; will-change: transform; transition: transform 0.32s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
    .cat-drum-belt.no-transition { transition: none !important; }
    .cat-drum-slot { flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .cat-drum-pill { padding: 7px 16px; border-radius: 20px; font-family: 'Fredoka One'; font-size: 13px; white-space: nowrap; border: 2px solid #ffd6d6; background: white; color: #999; transition: background 0.25s, color 0.25s, border-color 0.25s, transform 0.25s, box-shadow 0.25s, opacity 0.25s; transform: scale(0.88); opacity: 0.55; cursor: pointer; }
    .cat-drum-slot.active .cat-drum-pill { transform: scale(1.12); opacity: 1; box-shadow: 0 4px 16px rgba(0,0,0,0.15); }
    .grid { padding: 18px; display: grid; grid-template-columns: repeat(auto-fill,minmax(158px,1fr)); gap: 16px; }
    @media (max-width: 400px) { .grid { grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 12px; } }
    .empty-grid { grid-column: 1 / -1; text-align: center; padding: 50px; color: #ccc; font-family: 'Fredoka One'; font-size: 18px; }
    .product-top { padding: 14px; display: flex; justify-content: center; align-items: center; height: 120px; position: relative; }
    .product-image { width: 88px; height: 88px; object-fit: contain; border-radius: 10px; }
    .product-body { padding: 11px 13px; }
    .product-name { font-family: 'Fredoka One'; font-size: 15px; color: #222; }
    .chip { border-radius: 20px; padding: 2px 9px; font-size: 11px; font-weight: 800; display: inline-block; margin-top: 3px; }
    .price { font-family: 'Fredoka One'; color: #ff0000; font-size: 20px; margin-top: 7px; }
    .qty-control { display: flex; align-items: center; margin-top: 10px; border: 2px solid #ffd6d6; border-radius: 12px; overflow: hidden; }
    .qty-btn { flex: 1; background: #ffe0e0; color: #ff0000; height: 36px; font-size: 22px; border-radius: 0; padding: 0; }
    .qty-btn:disabled { background: #fff5f5; color: #ccc; cursor: not-allowed; }
    .qty-val { flex: 1; text-align: center; font-family: 'Fredoka One'; font-size: 18px; color: #bbb; }
    .qty-val.active { color: #ff0000; }
    .in-cart, .add-hint { margin-top: 9px; border-radius: 10px; padding: 7px 0; text-align: center; font-family: 'Fredoka One'; font-size: 13px; }

    .drawer-title { font-family: 'Fredoka One'; font-size: 22px; color: #ff0000; }
    .drawer-actions { display: flex; gap: 7px; }

    .close-btn { background: #f5f5f5; color: #555; padding: 6px 11px; font-size: 17px; }

    .cat-head { background: #fff0f0; border-radius: 10px; padding: 6px 12px; font-family: 'Fredoka One'; font-size: 14px; margin-bottom: 7px; }
